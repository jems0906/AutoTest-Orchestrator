name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite:///./autotest_ci.db
        run: |
          cd backend
          python -m pytest -q

  security-rbac-tests:
    name: Security RBAC Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run RBAC authorization tests
        env:
          DATABASE_URL: sqlite:///./autotest_rbac_ci.db
        run: |
          cd backend
          python -m pytest -q tests/test_auth_rbac.py

  db-migration-check:
    name: DB Migration Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Alembic upgrade
        env:
          DATABASE_URL: sqlite:///./autotest_migration_ci.db
        run: |
          python -m alembic -c backend/alembic.ini upgrade head

  schema-drift-check:
    name: Schema Drift Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Alembic drift check
        env:
          DATABASE_URL: sqlite:///./autotest_drift_ci.db
        run: |
          python -m alembic -c backend/alembic.ini upgrade head
          python -m alembic -c backend/alembic.ini check

  migration-file-guard:
    name: Migration File Guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate migration file presence for model changes
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > /tmp/changed_files.txt

          if grep -Eq '^backend/app/models\.py$' /tmp/changed_files.txt; then
            if ! grep -Eq '^backend/alembic/versions/.+\.py$' /tmp/changed_files.txt; then
              echo "Detected changes in backend/app/models.py without a migration file update in backend/alembic/versions/."
              echo "Create a migration with: python -m alembic -c backend/alembic.ini revision --autogenerate -m \"<message>\""
              exit 1
            fi
          fi

  api-contract-smoke:
    name: API Contract Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend and verify contracts
        env:
          DATABASE_URL: sqlite:///./autotest_contract.db
        run: |
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:8000/health > /tmp/health.json
          curl --fail --silent http://127.0.0.1:8000/api/dashboard > /tmp/dashboard.json
          curl --fail --silent http://127.0.0.1:8000/api/traceability > /tmp/traceability.json

          grep -q '"status"' /tmp/health.json
          grep -q '"requirement_coverage"' /tmp/dashboard.json
          grep -q '"regression_trends"' /tmp/dashboard.json
          grep -q '"requirement_key"' /tmp/traceability.json

      - name: Print backend logs on failure
        if: failure()
        run: |
          if [ -f /tmp/uvicorn.log ]; then
            cat /tmp/uvicorn.log
          fi

  frontend-static-smoke:
    name: Frontend Static Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate frontend static assets
        run: |
          test -f frontend/index.html
          test -f frontend/app.js
          test -f frontend/styles.css
          grep -q "app.js" frontend/index.html
          grep -q "styles.css" frontend/index.html

      - name: Serve and smoke test dashboard
        run: |
          cd frontend
          python -m http.server 5173 &
          SERVER_PID=$!
          sleep 2
          curl --fail --silent http://127.0.0.1:5173/ > /dev/null
          kill $SERVER_PID

  container-compose-smoke:
    name: Container Compose Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start full stack
        run: |
          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: Wait and verify service endpoints
        run: |
          set -euo pipefail
          backend_ready=0
          frontend_ready=0

          for i in {1..120}; do
            if [ "$backend_ready" -eq 0 ] && curl --fail --silent http://127.0.0.1:8000/health > /tmp/health.json; then
              backend_ready=1
            fi

            if [ "$frontend_ready" -eq 0 ] && curl --fail --silent http://127.0.0.1:5173/ > /tmp/frontend.html; then
              frontend_ready=1
            fi

            if [ "$backend_ready" -eq 1 ] && [ "$frontend_ready" -eq 1 ]; then
              break
            fi

            if [ $((i % 15)) -eq 0 ]; then
              echo "Readiness progress: backend=$backend_ready frontend=$frontend_ready attempt=$i"
              docker compose ps
            fi

            sleep 2
          done

          if [ "$backend_ready" -ne 1 ] || [ "$frontend_ready" -ne 1 ]; then
            echo "Services did not become ready in time. backend=$backend_ready frontend=$frontend_ready"
            docker compose ps
            exit 1
          fi

          curl --fail --silent --retry 10 --retry-connrefused --retry-delay 2 http://127.0.0.1:8000/api/dashboard > /tmp/dashboard.json

          grep -q '"status"' /tmp/health.json
          grep -q '"requirement_coverage"' /tmp/dashboard.json
          grep -qi '<!doctype html>' /tmp/frontend.html

      - name: Verify backend runs as non-root
        run: |
          docker compose exec -T backend python -c "import os; assert os.getuid() != 0, 'backend container is running as root'"

      - name: Print container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v
