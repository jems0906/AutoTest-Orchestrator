services:
  postgres:
    image: postgres:16
    container_name: autotest-postgres
    environment:
      POSTGRES_DB: autotest
      POSTGRES_USER: autotest
      POSTGRES_PASSWORD: autotest
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotest -d autotest"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: autotest-backend
    environment:
      DATABASE_URL: postgresql+psycopg://autotest:autotest@postgres:5432/autotest
      API_PREFIX: /api
      SCHEDULER_TIMEZONE: UTC
      REPORT_DIR: reports
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: autotest-frontend
    environment:
      PORT: "5173"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
